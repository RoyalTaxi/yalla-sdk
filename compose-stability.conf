// Compose compiler stability configuration.
//
// :core is a Compose-free, immutable domain kernel — its data classes, enums, value
// classes and sealed results are never mutated in place (a change yields a new instance).
// Declaring them stable lets the Compose compiler skip recomposition when these types flow
// through @Composable parameters / state, without pulling a Compose dependency into :core
// (so no @Stable / @Immutable annotations are needed there).
//
// Contract: everything under uz.yalla.core stays immutable. If a genuinely mutable type is
// ever introduced into :core, move it elsewhere or stop matching it here.
uz.yalla.core.**
