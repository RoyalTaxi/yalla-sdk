
build:
    maxIssues: 0

config:
    validation: true

complexity:
    LongMethod:
        ignoreAnnotated: [ "Composable", "Preview" ]
        threshold: 100
    LongParameterList:
        ignoreAnnotated: [ "Composable", "Preview" ]
        functionThreshold: 18
        constructorThreshold: 18
        ignoreDefaultParameters: true
    CyclomaticComplexMethod:
        ignoreAnnotated: [ "Composable", "Preview" ]
        threshold: 25
    LargeClass:
        threshold: 600
    TooManyFunctions:
        ignoreAnnotated: [ "Composable", "Preview" ]
        thresholdInClasses: 25
        thresholdInInterfaces: 25
        thresholdInObjects: 25

naming:
    FunctionNaming:
        ignoreAnnotated: [ "Composable", "Preview" ]
        functionPattern: "[a-zA-Z][a-zA-Z0-9]*"
    TopLevelPropertyNaming:
        constantPattern: "[A-Za-z][A-Za-z0-9_]*"
    MatchingDeclarationName:
        active: false

style:
    MagicNumber:
        active: false
    ReturnCount:
        max: 6
    DestructuringDeclarationWithTooManyEntries:
        maxDestructuringEntries: 4
    UnusedPrivateMember:
        ignoreAnnotated: [ "Composable", "Preview" ]
    ForbiddenComment:
        active: true
        comments:
            -   reason: "Track TODOs in the issue tracker, not the code."
                value: "TODO"
            -   reason: "Fix before shipping."
                value: "FIXME"
            -   reason: "Never ship a STOPSHIP."
                value: "STOPSHIP"

exceptions:
    TooGenericExceptionCaught:
        allowedExceptionNameRegex: "_|(ignore|expected).*"
    SwallowedException:
        allowedExceptionNameRegex: "_|(ignore|expected).*"
        ignoredExceptionTypes:
            - InterruptedException
            - MalformedURLException
            - NumberFormatException
            - ParseException
