build:
  maxIssues: 0

config:
  validation: true

complexity:
  LongMethod:
    threshold: 60
  LongParameterList:
    functionThreshold: 8
    constructorThreshold: 10
  LargeClass:
    threshold: 600
  TooManyFunctions:
    thresholdInFiles: 20
    thresholdInClasses: 20
    thresholdInInterfaces: 20

naming:
  FunctionNaming:
    ignoreAnnotated:
      - Composable
  TopLevelPropertyNaming:
    active: false

style:
  WildcardImport:
    # iOS interop in iosMain needs `import platform.UIKit.*` to pull in
    # ObjC category methods (navigationController, navigationItem, etc.) that
    # the cinterop layer exposes only via wildcard. Named imports do not
    # reach those extensions.
    excludes:
      - '**/iosMain/**'
      - '**/iosArm64Main/**'
      - '**/iosSimulatorArm64Main/**'
      - '**/appleMain/**'
  MagicNumber:
    ignoreNumbers:
      - "-1"
      - "0"
      - "1"
      - "2"
    ignorePropertyDeclaration: true
    ignoreAnnotation: true
    ignoreEnums: true
  ForbiddenComment:
    active: true
    comments:
      - reason: 'Avoid TODOs in published SDK code; raise issues instead.'
        value: 'TODO'
      - reason: 'Avoid FIXMEs in published SDK code; raise issues instead.'
        value: 'FIXME'
      - value: 'STOPSHIP'
  MaxLineLength:
    maxLineLength: 120
  ReturnCount:
    max: 4
  UnusedPrivateMember:
    active: true
