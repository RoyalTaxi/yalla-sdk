build:
  maxIssues: 0

complexity:
  LongMethod:
    # Compose composables legitimately span >60 lines (setup + Column/Box
    # with subcomponents + modifier chains). 120 is a real ceiling where the
    # method likely does too much.
    threshold: 120
  LongParameterList:
    # Compose composables routinely take >10 params (state, colors, dimens,
    # modifier, content slots, callbacks). 20 matches the repo idiom.
    functionThreshold: 20
    constructorThreshold: 20
  TooManyFunctions:
    thresholdInFiles: 30
    thresholdInClasses: 30
    thresholdInInterfaces: 20
  CyclomaticComplexMethod:
    # Compose interop layers (iOS UIKit bridging, bitmap capture) naturally
    # have high branch counts from conditional rendering paths.
    threshold: 25
  ComplexCondition:
    # Camera + permission gating composites have 4-way guarded launch
    # conditions (authorized && autoLaunch && !isLaunching && !hasLaunched).
    threshold: 5

style:
  MaxLineLength:
    maxLineLength: 120
    excludes:
      - "**/build/generated/**"
      - "**/generated/**"
  WildcardImport:
    active: false
  MagicNumber:
    active: false
  ForbiddenComment:
    active: false
  ReturnCount:
    max: 5
  UnusedPrivateMember:
    ignoreAnnotated:
      - "Preview"
  UnusedParameter:
    ignoreAnnotated:
      - "Preview"

naming:
  FunctionNaming:
    ignoreAnnotated:
      - "Composable"
      - "InternalResourceApi"
    # Compose-Resources generator emits `_collectCommonMainString0Resources` etc.
    # which start with underscore. Allow that pattern in addition to default.
    functionPattern: "[a-zA-Z_][a-zA-Z0-9_]*"
  TopLevelPropertyNaming:
    constantPattern: "[A-Za-z][_A-Za-z0-9]*"
  # MatchingDeclarationName is a low-signal rule for this codebase —
  # CompositionLocal files group a state class + provider composable +
  # accessor, which reads cleaner in one file than scattered.
  MatchingDeclarationName:
    active: false

coroutines:
  # Direct Dispatchers.IO usage is widespread in platform actuals and
  # image-processing code (media module). Threading a dispatcher param through
  # every call site is a Phase 5 refactor, not a Phase 3 CI-wire.
  InjectDispatcher:
    active: false
  # RedundantSuspendModifier fires on transitional interop bridges where
  # callers are all suspend and the body may start async in a follow-up.
  RedundantSuspendModifier:
    active: false

exceptions:
  # SDK-integration layers (firebase, native bridges) legitimately catch
  # Exception to wrap third-party SDK throwables we can't enumerate.
  TooGenericExceptionCaught:
    active: false
  # Classifying Ktor transport errors for retry decisions requires
  # `e is IOException` discrimination — this rule is noise there.
  InstanceOfCheckForException:
    active: false
