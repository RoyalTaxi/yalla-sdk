name: Documentation issue
description: Missing, wrong, or unclear documentation
title: "[docs] "
labels: [docs]
body:
  - type: input
    id: location
    attributes:
      label: Where
      description: Link or path to the page/section
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: Issue
    validations:
      required: true
