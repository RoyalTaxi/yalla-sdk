name: Bug report
description: Report a crash, unexpected behavior, or wrong output in the SDK
title: "[bug] "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for filing a bug. Please include enough detail that a maintainer can reproduce without guessing.
  - type: input
    id: sdk-version
    attributes:
      label: SDK version
      placeholder: "1.0.0 / 0.0.8-alpha04 / commit SHA"
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Android
        - iOS
        - Both
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened
      description: What did you do? What did you expect? What did you see instead?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Code snippet or link to a branch/repo. If none, describe step-by-step what triggers the bug.
  - type: textarea
    id: logs
    attributes:
      label: Logs / stack trace
      render: text
