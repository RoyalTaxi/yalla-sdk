name: PR

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: read

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android-build:
    name: Android publications dry-run
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Build android + metadata publications
        run: |
          ./gradlew \
            publishAndroidPublicationToMavenLocal \
            publishBomPublicationToMavenLocal \
            publishKotlinMultiplatformPublicationToMavenLocal \
            --no-daemon \
            --no-configuration-cache \
            -Dorg.gradle.workers.max=2

  test:
    name: Unit tests (host)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Run host unit tests
        run: ./gradlew testAndroidHostTest --no-daemon -Dorg.gradle.workers.max=2
