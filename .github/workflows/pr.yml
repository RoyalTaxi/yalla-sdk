name: PR

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: read

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android-build:
    name: Android publications dry-run
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Build android + metadata publications
        run: |
          ./gradlew \
            publishAndroidPublicationToMavenLocal \
            publishBomPublicationToMavenLocal \
            publishKotlinMultiplatformPublicationToMavenLocal \
            --no-daemon \
            --no-configuration-cache \
            -Dorg.gradle.workers.max=2

  static-analysis:
    # G4 — the consistency gate. detekt (code smells) + ktlint (formatting, driven by
    # the committed .editorconfig) across every module via the `staticAnalysis` task the
    # quality convention plugin wires up. Host-agnostic (no type resolution / no Apple
    # toolchain needed), so it runs on Linux. Keep the check name `static-analysis` stable
    # — it is the required status check in branch protection.
    name: static-analysis
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: detekt + ktlint (G4)
        run: ./gradlew staticAnalysis --no-daemon --no-configuration-cache -Dorg.gradle.workers.max=2

  test:
    name: Unit tests (host)
    # macOS runner: the G3 ABI gate (apiCheck) validates BOTH published surfaces —
    # the Android .aar (via androidApiCheck, host-agnostic) and the iOS klibs. The
    # klib half can only be built on an Apple host; on Linux those targets no-op, so
    # we run the whole gate on macOS to keep both halves enforced. Host unit tests +
    # Konsist run here unchanged.
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Run host unit tests + ABI surface check (G3)
        run: ./gradlew testAndroidHostTest :konsistTest:test apiCheck --no-daemon -Dorg.gradle.workers.max=2
