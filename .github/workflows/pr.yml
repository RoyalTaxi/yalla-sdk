name: PR

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: read

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ktlint:
    name: ktlint
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
      - name: ktlintCheck
        run: ./gradlew ktlintCheck --continue
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  detekt:
    name: detekt
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
      - name: detekt
        run: ./gradlew detekt --continue
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  api-check:
    name: Binary Compatibility (apiCheck)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
      - name: apiCheck
        run: ./gradlew apiCheck
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  tests:
    name: Tests
    # macOS — same rationale as publish.yml: iOS test executable linking
    # requires the Apple toolchain. Constrained worker count to keep
    # Kotlin/Native + Gradle daemon under the runner's memory budget.
    runs-on: macos-latest
    timeout-minutes: 60
    env:
      GRADLE_OPTS: "-Dorg.gradle.workers.max=2 -Dorg.gradle.parallel=false"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4

      - name: CocoaPods install (maps + media native deps)
        run: ./gradlew podInstall

      # Same module split as publish.yml — see that workflow for the reason
      # firebase / maps / foundation iOS test executables can't be linked
      # in CI without extra framework search paths.
      - name: Tests (modules with clean iOS test link)
        run: |
          ./gradlew \
            :core:allTests \
            :data:allTests \
            :design:allTests \
            :primitives:allTests \
            :composites:allTests \
            :media:allTests \
            :platform:allTests \
            --max-workers=2 --no-parallel
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Tests (foundation — Android only; iOS test link blocked by moko-geo)
        run: |
          ./gradlew \
            :foundation:allTests \
            -x :foundation:iosSimulatorArm64Test \
            -x :foundation:linkDebugTestIosSimulatorArm64 \
            --max-workers=2 --no-parallel
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compile firebase + maps (no iOS test link)
        run: |
          ./gradlew \
            :firebase:compileKotlinIosSimulatorArm64 :firebase:compileAndroidMain \
            :maps:compileKotlinIosSimulatorArm64 :maps:compileAndroidMain \
            --max-workers=2 --no-parallel
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
