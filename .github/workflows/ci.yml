name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, feature/**]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
      - name: ktlintCheck
        run: ./gradlew ktlintCheck
      - name: detekt
        run: ./gradlew detekt
