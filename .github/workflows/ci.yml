name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, feature/**]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
      - name: ktlintCheck
        run: ./gradlew ktlintCheck
      - name: detekt
        run: ./gradlew detekt

  api-check:
    name: API check (Native + commonMain via Klib)
    runs-on: macos-latest
    timeout-minutes: 30
    env:
      DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
      - name: Install CocoaPods (if missing)
        run: |
          if ! command -v pod >/dev/null 2>&1; then
            brew install cocoapods
          fi
          pod --version
      - name: apiCheck
        run: ./gradlew apiCheck

  test:
    name: Test (allTests on macOS)
    runs-on: macos-latest
    timeout-minutes: 45
    env:
      DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
      - name: Install CocoaPods (if missing)
        run: |
          if ! command -v pod >/dev/null 2>&1; then
            brew install cocoapods
          fi
          pod --version
      # This project uses AGP 9.0's KMP-Android target (com.android.kotlin.multiplatform.library),
      # which does not emit a root `test` Gradle task. `allTests` is the canonical aggregate
      # test task for KMP; it covers iOS simulator + Android + common tests for every module.
      - name: allTests
        run: ./gradlew allTests
