name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, feature/**]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
      - name: ktlintCheck
        run: ./gradlew ktlintCheck
      - name: detekt
        run: ./gradlew detekt

  api-check:
    name: API check (Native + commonMain via Klib)
    runs-on: macos-latest
    env:
      DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
      - name: Install CocoaPods
        run: |
          brew install cocoapods || true
          pod --version
      - name: apiCheck
        run: ./gradlew apiCheck

  test:
    name: Test (allTests on macOS)
    runs-on: macos-latest
    env:
      DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
      - name: Install CocoaPods
        run: |
          brew install cocoapods || true
          pod --version
      - name: allTests
        run: ./gradlew allTests
