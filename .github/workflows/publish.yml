name: Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    name: Publish android artifacts to GitHub Packages
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      GITHUB_ACTOR: ${{ github.actor }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4

      # Android + common-metadata publications only. The SDK's iOS native deps
      # moved from CocoaPods to SwiftPM (consumed by the iOS app directly), so
      # no podInstall / Kotlin-Native linking is needed to publish the android
      # AARs the client resolves. The per-module task names are run at the root
      # so every module that declares them is published, no hardcoded list.
      #
      # Gated on commits whose message starts with `release(` so non-release
      # pushes to main don't republish the same version (GitHub Packages
      # returns 409 on identical coordinates).
      - name: Publish
        if: startsWith(github.event.head_commit.message, 'release(')
        run: |
          ./gradlew \
            publishAndroidPublicationToGitHubPackagesRepository \
            publishBomPublicationToGitHubPackagesRepository \
            publishKotlinMultiplatformPublicationToGitHubPackagesRepository \
            --no-daemon \
            --no-configuration-cache \
            --stacktrace \
            -Dorg.gradle.workers.max=2 \
            "-Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8" \
            "-Dkotlin.daemon.jvmargs=-Xmx2g -XX:MaxMetaspaceSize=512m"

  publish-ios:
    name: Publish ios klib artifacts to GitHub Packages
    runs-on: macos-latest
    timeout-minutes: 45

    env:
      GITHUB_ACTOR: ${{ github.actor }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      # Klib publications only — no framework linking, no tests. Gated like the
      # android job, plus workflow_dispatch so ios artifacts can be backfilled
      # for an already-published version without re-running (and 409ing) android.
      - name: Publish
        if: startsWith(github.event.head_commit.message, 'release(') || github.event_name == 'workflow_dispatch'
        run: |
          ./gradlew \
            publishIosArm64PublicationToGitHubPackagesRepository \
            publishIosSimulatorArm64PublicationToGitHubPackagesRepository \
            --no-daemon \
            --no-configuration-cache \
            --stacktrace \
            -Dorg.gradle.workers.max=2 \
            "-Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8" \
            "-Dkotlin.daemon.jvmargs=-Xmx2g -XX:MaxMetaspaceSize=512m"
