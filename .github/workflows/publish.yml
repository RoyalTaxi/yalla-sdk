name: Publish

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write
  pages: write
  id-token: write

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: macos-latest
    timeout-minutes: 90
    environment:
      name: github-pages
      url: ${{ steps.pages.outputs.page_url }}
    # macos-latest = 3 cores, ~14 GB RAM. Kotlin/Native iOS framework
    # linking + Gradle daemon + Kotlin daemon all want several GB each.
    # Cap parallelism so multiple linker subprocesses don't OOM the runner.
    env:
      GRADLE_OPTS: "-Dorg.gradle.workers.max=2 -Dorg.gradle.parallel=false"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4

      - name: CocoaPods install (maps + media native deps)
        run: ./gradlew podInstall

      # Tests run on the 8 modules whose iOS test executables actually
      # link cleanly. :firebase and :maps are skipped here because:
      #   - :firebase has no cocoapods integration; gitlive Firebase
      #     KMP wrappers cinterop to FirebaseCore.framework which isn't
      #     available at link time on CI (`ld: framework 'FirebaseCore'
      #     not found`).
      #   - :maps' iOS test link similarly needs GoogleMaps/Apple Maps
      #     pod symbols that aren't resolvable in the test target.
      # We verify both modules COMPILE (klib + AAR) below; we just don't
      # link their iOS test executables. Same posture used during
      # phase-3 wave-9 verification locally.
      - name: Tests (testable modules)
        run: |
          ./gradlew \
            :core:allTests \
            :data:allTests \
            :design:allTests \
            :foundation:allTests \
            :primitives:allTests \
            :composites:allTests \
            :media:allTests \
            :platform:allTests \
            --max-workers=2 --no-parallel

      - name: Compile firebase + maps (no iOS test link)
        run: |
          ./gradlew \
            :firebase:compileKotlinIosSimulatorArm64 :firebase:compileAndroidMain \
            :maps:compileKotlinIosSimulatorArm64 :maps:compileAndroidMain \
            --max-workers=2 --no-parallel

      # Publish — only needs Kotlin compile (klib) + Android library
      # (AAR), NOT the .framework binaries that `./gradlew build`
      # triggered. Skipping framework linking cuts 4×N tasks (Debug/
      # Release × Arm64/SimArm64 × every module) and the memory pressure
      # that hung the runner indefinitely on prior runs.
      - name: Publish to GitHub Packages
        run: ./gradlew publish --max-workers=2 --no-parallel
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Dokka docs
        run: ./gradlew dokkaGenerate --max-workers=2 --no-parallel

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/dokka

      - id: pages
        uses: actions/deploy-pages@v4
