name: Publish

on:
    push:
        branches: [ main, dev ]
    workflow_dispatch:

permissions:
    contents: read
    packages: write

concurrency:
    group: publish
    cancel-in-progress: false

jobs:
    publish:
        name: Publish android artifacts to GitHub Packages
        runs-on: ubuntu-latest
        timeout-minutes: 45

        env:
            GITHUB_ACTOR: ${{ github.actor }}
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

        steps:
            -   uses: actions/checkout@v4

            -   uses: actions/setup-java@v4
                with:
                    java-version: '21'
                    distribution: 'temurin'

            -   uses: gradle/actions/setup-gradle@v4

            -   name: Publish
                if: startsWith(github.event.head_commit.message, 'release(')
                run: |
                    ./gradlew \
                      publishAndroidPublicationToGitHubPackagesRepository \
                      publishBomPublicationToGitHubPackagesRepository \
                      publishKotlinMultiplatformPublicationToGitHubPackagesRepository \
                      --no-daemon \
                      --no-configuration-cache \
                      --stacktrace \
                      -Dorg.gradle.workers.max=2 \
                      "-Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8" \
                      "-Dkotlin.daemon.jvmargs=-Xmx2g -XX:MaxMetaspaceSize=512m"

    publish-ios:
        name: Publish ios klib artifacts to GitHub Packages
        runs-on: macos-latest
        timeout-minutes: 45

        env:
            GITHUB_ACTOR: ${{ github.actor }}
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

        steps:
            -   uses: actions/checkout@v4

            -   uses: actions/setup-java@v4
                with:
                    distribution: temurin
                    java-version: 21

            -   uses: gradle/actions/setup-gradle@v4

            -   name: Publish
                if: startsWith(github.event.head_commit.message, 'release(') || github.event_name == 'workflow_dispatch'
                run: |
                    ./gradlew \
                      publishIosArm64PublicationToGitHubPackagesRepository \
                      publishIosSimulatorArm64PublicationToGitHubPackagesRepository \
                      --no-daemon \
                      --no-configuration-cache \
                      --stacktrace \
                      -Dorg.gradle.workers.max=2 \
                      "-Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8" \
                      "-Dkotlin.daemon.jvmargs=-Xmx2g -XX:MaxMetaspaceSize=512m"
