name: Publish

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write
  pages: write
  id-token: write

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: macos-latest
    timeout-minutes: 90
    environment:
      name: github-pages
      url: ${{ steps.pages.outputs.page_url }}
    # macos-latest = 3 cores, ~14 GB RAM. Kotlin/Native iOS framework
    # linking + Gradle daemon + Kotlin daemon all want several GB each.
    # Cap parallelism so multiple linker subprocesses don't OOM the runner.
    env:
      GRADLE_OPTS: "-Dorg.gradle.workers.max=2 -Dorg.gradle.parallel=false"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4

      - name: CocoaPods install (maps + media native deps)
        run: ./gradlew podInstall

      # Three modules need native iOS frameworks at test-executable link
      # time that aren't on CI's linker search path:
      #   - :firebase — gitlive KMP wrappers cinterop to
      #     FirebaseCore.framework (no cocoapods integration in this
      #     module).
      #   - :foundation — moko-geo cinterops to _LocationEssentials.framework.
      #   - :maps — GoogleMaps/Apple Maps cocoapod symbols.
      # Strategy: run :allTests on the 7 modules whose iOS test executables
      # link cleanly, plus run foundation's Android unit tests (it has
      # ~56 valuable Android-side tests we don't want to lose). Verify
      # firebase/maps/foundation iOS klib compiles, but skip the iOS
      # test executable link.
      - name: Tests (modules with clean iOS test link)
        run: |
          ./gradlew \
            :core:allTests \
            :data:allTests \
            :design:allTests \
            :primitives:allTests \
            :composites:allTests \
            :media:allTests \
            :platform:allTests \
            --max-workers=2 --no-parallel

      - name: Tests (foundation — Android only; iOS test link blocked by moko-geo)
        run: |
          ./gradlew \
            :foundation:allTests \
            -x :foundation:iosSimulatorArm64Test \
            -x :foundation:linkDebugTestIosSimulatorArm64 \
            --max-workers=2 --no-parallel

      - name: Compile firebase + maps (no iOS test link)
        run: |
          ./gradlew \
            :firebase:compileKotlinIosSimulatorArm64 :firebase:compileAndroidMain \
            :maps:compileKotlinIosSimulatorArm64 :maps:compileAndroidMain \
            --max-workers=2 --no-parallel

      # Publish — only needs Kotlin compile (klib) + Android library
      # (AAR), NOT the .framework binaries that `./gradlew build`
      # triggered. Skipping framework linking cuts 4×N tasks (Debug/
      # Release × Arm64/SimArm64 × every module) and the memory pressure
      # that hung the runner indefinitely on prior runs.
      - name: Publish to GitHub Packages
        run: ./gradlew publish --max-workers=2 --no-parallel
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Dokka docs
        run: ./gradlew dokkaGenerate --max-workers=2 --no-parallel

      - name: Generate Storytale component catalog (wasmJs)
        # `--no-configuration-cache` because KGP's KotlinWebpack task isn't config-cache
        # compatible on JDK 21 (SoftReference reflection + project-state captures).
        run: ./gradlew :component-catalog:wasmJsBrowserStoriesProductionExecutableDistribution --max-workers=2 --no-parallel --no-configuration-cache

      - name: Assemble GitHub Pages site
        # / — landing page (docs/pages/index.html)
        # /api — Dokka API reference
        # /components — live Storytale wasmJs gallery rendering SDK primitives
        run: |
          rm -rf build/pages
          mkdir -p build/pages/api build/pages/components
          cp -R docs/pages/. build/pages/
          cp -R component-catalog/build/dist/wasmJs/StoriesProductionExecutable/. build/pages/components/
          cp -R build/dokka/. build/pages/api/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/pages

      - id: pages
        uses: actions/deploy-pages@v4
